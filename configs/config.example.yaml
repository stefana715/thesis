project:
  name: thesis
  topic: low-data urban solar potential assessment
  study_area: Changsha, Hunan, China

paths:
  raw_data: data/raw
  interim_data: data/interim
  processed_data: data/processed
  figures: outputs/figures
  tables: outputs/tables
  logs: logs

workflow:
